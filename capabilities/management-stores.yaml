naftiko: 1.0.0-alpha2
info:
  label: "Lunchbox Management API \u2014 Stores"
  description: "Administration \u2014 Stores. 2 operations. Lead operation: Get Stores. Self-contained Naftiko capability covering one Lunchbox business surface."
  tags:
  - Lunchbox
  - Administration
  - Stores
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    LUNCHBOX_TOKEN: LUNCHBOX_TOKEN
capability:
  consumes:
  - type: http
    namespace: management-stores
    baseUri: https://chain.lunchbox.io/api/v2
    description: "Lunchbox Management API \u2014 Stores. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.LUNCHBOX_TOKEN}}'
    resources:
    - name: management-stores
      path: /management/stores
      operations:
      - name: managementGetStores
        method: GET
        description: Get Stores
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: ''
        - name: page
          in: query
          type: integer
          required: false
          description: ''
        - name: search
          in: query
          type: string
          required: false
          description: ''
        - name: rest_id
          in: query
          type: integer
          required: false
          description: ''
        - name: promise_date
          in: query
          type: string
          required: false
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: management-stores-store-id
      path: /management/stores/{store_id}
      operations:
      - name: managementGetStore
        method: GET
        description: Get Store by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: management-stores-rest
    port: 8080
    description: "REST adapter for Lunchbox Management API \u2014 Stores."
    resources:
    - path: /v1/management-stores
      name: management-stores
      description: REST surface for Get Stores.
      operations:
      - method: GET
        name: managementGetStores
        description: Get Stores
        call: management-stores.managementGetStores
        with:
          limit: rest.limit
          page: rest.page
          search: rest.search
          rest_id: rest.rest_id
          promise_date: rest.promise_date
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/management-stores-store-id
      name: management-stores-store-id
      description: REST surface for Get Store by ID.
      operations:
      - method: GET
        name: managementGetStore
        description: Get Store by ID
        call: management-stores.managementGetStore
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-stores-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Lunchbox Management API \u2014 Stores."
    tools:
    - name: get-stores
      description: Get Stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-stores.managementGetStores
      with:
        limit: tools.limit
        page: tools.page
        search: tools.search
        rest_id: tools.rest_id
        promise_date: tools.promise_date
      outputParameters:
      - type: object
        mapping: $.
    - name: get-store-id
      description: Get Store by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-stores.managementGetStore
      outputParameters:
      - type: object
        mapping: $.

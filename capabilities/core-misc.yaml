naftiko: 1.0.0-alpha2
info:
  label: "Lunchbox Core API \u2014 Misc"
  description: "Ordering \u2014 Misc. 4 operations. Lead operation: Get Contact Info. Self-contained Naftiko capability covering one Lunchbox business surface."
  tags:
  - Lunchbox
  - Ordering
  - Misc
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    LUNCHBOX_TOKEN: LUNCHBOX_TOKEN
capability:
  consumes:
  - type: http
    namespace: core-misc
    baseUri: https://chain.lunchbox.io/api/v2
    description: "Lunchbox Core API \u2014 Misc. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.LUNCHBOX_TOKEN}}'
    resources:
    - name: contact
      path: /contact
      operations:
      - name: getContact
        method: GET
        description: Get Contact Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: contact
      path: /contact
      operations:
      - name: submitContact
        method: POST
        description: Submit a Contact Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: countries
      path: /countries
      operations:
      - name: listCountries
        method: GET
        description: List Countries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: states
      path: /states
      operations:
      - name: listStates
        method: GET
        description: List States
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: core-misc-rest
    port: 8080
    description: "REST adapter for Lunchbox Core API \u2014 Misc."
    resources:
    - path: /v1/contact
      name: contact
      description: REST surface for Get Contact Info.
      operations:
      - method: GET
        name: getContact
        description: Get Contact Info
        call: core-misc.getContact
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/contact
      name: contact
      description: REST surface for Submit a Contact Message.
      operations:
      - method: POST
        name: submitContact
        description: Submit a Contact Message
        call: core-misc.submitContact
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/countries
      name: countries
      description: REST surface for List Countries.
      operations:
      - method: GET
        name: listCountries
        description: List Countries
        call: core-misc.listCountries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/states
      name: states
      description: REST surface for List States.
      operations:
      - method: GET
        name: listStates
        description: List States
        call: core-misc.listStates
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: core-misc-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Lunchbox Core API \u2014 Misc."
    tools:
    - name: get-contact-info
      description: Get Contact Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: core-misc.getContact
      outputParameters:
      - type: object
        mapping: $.
    - name: submit-contact-message
      description: Submit a Contact Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: core-misc.submitContact
      outputParameters:
      - type: object
        mapping: $.
    - name: list-countries
      description: List Countries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: core-misc.listCountries
      outputParameters:
      - type: object
        mapping: $.
    - name: list-states
      description: List States
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: core-misc.listStates
      outputParameters:
      - type: object
        mapping: $.

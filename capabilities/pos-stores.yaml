naftiko: 1.0.0-alpha2
info:
  label: "Lunchbox POS API \u2014 Stores"
  description: "POS Integration \u2014 Stores. 2 operations. Lead operation: Get Stores. Self-contained Naftiko capability covering one Lunchbox business surface."
  tags:
  - Lunchbox
  - POS Integration
  - Stores
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    LUNCHBOX_TOKEN: LUNCHBOX_TOKEN
capability:
  consumes:
  - type: http
    namespace: pos-stores
    baseUri: https://chain.lunchbox.io/api/v2
    description: "Lunchbox POS API \u2014 Stores. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.LUNCHBOX_TOKEN}}'
    resources:
    - name: pos-stores
      path: /pos/stores
      operations:
      - name: posGetStores
        method: GET
        description: Get Stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pos-stores-store-id
      path: /pos/stores/{store_id}
      operations:
      - name: posGetStoreDetails
        method: GET
        description: Get Store Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-stores-rest
    port: 8080
    description: "REST adapter for Lunchbox POS API \u2014 Stores."
    resources:
    - path: /v1/pos-stores
      name: pos-stores
      description: REST surface for Get Stores.
      operations:
      - method: GET
        name: posGetStores
        description: Get Stores
        call: pos-stores.posGetStores
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pos-stores-store-id
      name: pos-stores-store-id
      description: REST surface for Get Store Details.
      operations:
      - method: GET
        name: posGetStoreDetails
        description: Get Store Details
        call: pos-stores.posGetStoreDetails
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-stores-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Lunchbox POS API \u2014 Stores."
    tools:
    - name: get-stores
      description: Get Stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-stores.posGetStores
      outputParameters:
      - type: object
        mapping: $.
    - name: get-store-details
      description: Get Store Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-stores.posGetStoreDetails
      outputParameters:
      - type: object
        mapping: $.

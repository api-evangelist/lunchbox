naftiko: 1.0.0-alpha2
info:
  label: "Lunchbox POS API \u2014 Orders"
  description: "POS Integration \u2014 Orders. 3 operations. Lead operation: Submit an Order. Self-contained Naftiko capability covering one Lunchbox business surface."
  tags:
  - Lunchbox
  - POS Integration
  - Orders
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    LUNCHBOX_TOKEN: LUNCHBOX_TOKEN
capability:
  consumes:
  - type: http
    namespace: pos-orders
    baseUri: https://chain.lunchbox.io/api/v2
    description: "Lunchbox POS API \u2014 Orders. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.LUNCHBOX_TOKEN}}'
    resources:
    - name: pos-orders-pos-store-id
      path: /pos/orders/{pos_store_id}
      operations:
      - name: posSubmitOrder
        method: POST
        description: Submit an Order
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request body.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pos-orders-pos-store-id-pos-order-id
      path: /pos/orders/{pos_store_id}/{pos_order_id}
      operations:
      - name: posGetOrder
        method: GET
        description: Get an Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: pos-orders-pos-store-id-pos-order-id
      path: /pos/orders/{pos_store_id}/{pos_order_id}
      operations:
      - name: posUpdateOrder
        method: PUT
        description: Update an Order
        inputParameters:
        - name: body
          in: body
          type: object
          required: false
          description: Request body.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: pos-orders-rest
    port: 8080
    description: "REST adapter for Lunchbox POS API \u2014 Orders."
    resources:
    - path: /v1/pos-orders-pos-store-id
      name: pos-orders-pos-store-id
      description: REST surface for Submit an Order.
      operations:
      - method: POST
        name: posSubmitOrder
        description: Submit an Order
        call: pos-orders.posSubmitOrder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pos-orders-pos-store-id-pos-order-id
      name: pos-orders-pos-store-id-pos-order-id
      description: REST surface for Get an Order.
      operations:
      - method: GET
        name: posGetOrder
        description: Get an Order
        call: pos-orders.posGetOrder
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pos-orders-pos-store-id-pos-order-id
      name: pos-orders-pos-store-id-pos-order-id
      description: REST surface for Update an Order.
      operations:
      - method: PUT
        name: posUpdateOrder
        description: Update an Order
        call: pos-orders.posUpdateOrder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pos-orders-mcp
    port: 9090
    transport: http
    description: "MCP adapter for Lunchbox POS API \u2014 Orders."
    tools:
    - name: submit-order
      description: Submit an Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pos-orders.posSubmitOrder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-order
      description: Get an Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pos-orders.posGetOrder
      outputParameters:
      - type: object
        mapping: $.
    - name: update-order
      description: Update an Order
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: pos-orders.posUpdateOrder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.

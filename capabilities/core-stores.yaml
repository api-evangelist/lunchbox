    namespace: core-stores
    baseUri: https://chain.lunchbox.io/api/v2
    description: "Lunchbox Core API \u2014 Stores. Self-contained, no shared references."
    authentication:
      type: bearer
      token: '{{env.LUNCHBOX_TOKEN}}'
    resources:
    - name: stores-configuration
      path: /stores/configuration
      operations:
      - name: getChainConfiguration
        method: GET
        description: Get Chain Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: stores
      path: /stores
      operations:
      - name: getStore
        method: GET
        description: Get Store Info
        inputParameters:
        - name: store_id
          in: query
          type: string
          required: true
          description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

naftiko: 1.0.0-alpha2
info:
  label: "Lunchbox Core API \u2014 Stores"
  description: "Ordering \u2014 Stores. 16 operations. Lead operation: Get Chain Configuration. Self-contained Naftiko capability covering one Lunchbox business surface."
  tags:
  - Lunchbox
  - Ordering
  - Stores
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    LUNCHBOX_TOKEN: LUNCHBOX_TOKEN
capability:

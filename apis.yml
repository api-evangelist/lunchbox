    name: Lunchbox Open API
    description: >-
      The Lunchbox Open API is a connectivity platform linking a restaurant's
      tech stack to the Lunchbox ecosystem. It includes a Core API for ordering
      functions and frontend interfaces, and supports retrieving location and
      menu data, managing guest accounts, injecting orders into the POS,
      last-mile delivery webhooks, digital menu boards, and kiosk and
      third-party marketplace experiences.

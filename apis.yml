aid: lunchbox
name: Lunchbox
description: >-
  Lunchbox is a digital ordering and guest engagement platform for enterprise
  restaurant chains and ghost kitchens, offering online ordering, catering,
  loyalty, marketing CRM, order aggregation, and call center tooling across
  thousands of locations. For technology partners, Lunchbox provides an Open
  API that connects a restaurant's tech stack to its ecosystem, exposing
  location and menu data, guest account management, and order injection into
  the POS. The Open API supports last-mile delivery webhooks, menu consumption
  for digital boards and kiosks, and third-party marketplace integrations, and
  is documented on a dedicated developer portal at docs.lunchbox.io.
type: Index

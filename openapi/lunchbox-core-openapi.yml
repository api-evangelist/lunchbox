components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'Team token passed as: Authorization: Token <team_token>'
  parameters:
    CustomerId:
      name: customer_id
      in: path
      required: true
      schema:
        type: integer
    OrderId:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
    StoreId:
      name: store_id
      in: path
      required: true
      schema:
        type: string
    MenuId:
      name: menu_id
      in: path
      required: true
      schema:
        type: integer
    CategoryId:
      name: category_id
      in: path
      required: true
      schema:
        type: integer
    ItemId:
      name: item_id
      in: path
      required: true
      schema:
        type: integer
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          format: email
          example: demo@lunchbox.io
        password:
          type: string
          example: string
    AuthSession:
      type: object
      properties:
        customer_id:
          type: integer
          example: 1234
        auth_cookie:
          type: string
          example: string
    RegistrationRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: demo@lunchbox.io
        password:
          type: string
          example: string
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Smith
        phone:
          type: string
          example: '2125551411'
        email_optin:
          type: boolean
          example: true
        auto_login:
          type: boolean
          example: true
        birthdate:
          type: string
          format: date
          example: '1990-05-21'
    Customer:
      type: object
      properties:
        customer_id:
          type: integer
          example: 1234
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Smith
        email:
          type: string
          format: email
          example: demo@lunchbox.io
        phone:
          type: string
          example: '2125551411'
        is_phone_verified:
          type: boolean
          example: '2125551411'
        is_verified:
          type: boolean
          example: true
        is_guest:
          type: boolean
          example: true
        is_mgmt:
          type: boolean
          example: true
        company_name:
          type: string
          nullable: true
          example: Sample
        occupation:
          type: string
          nullable: true
          example: string
        birthdate:
          type: string
          format: date
          nullable: true
          example: '1990-05-21'
    Address:
      type: object
      properties:
        address_id:
          type: integer
          example: 1234
        address1:
          type: string
          example: 1216 Broadway
        address2:
          type: string
          nullable: true
          example: string
        address3:
          type: string
          nullable: true
          example: string
        city:
          type: string
          example: New York
        statecode:
          type: string
          example: NY
        zipcode:
          type: string
          example: '10001'
        country:
          type: string
          example: US
        instructions:
          type: string
          nullable: true
          example: string
        latitude:
          type: number
          example: 40.74661
        longitude:
          type: number
          example: -73.98833
    NewOrderRequest:
      type: object
      properties:
        customer_id:
          type: integer
          example: 1234
        store_id:
          type: string
          example: '123456'
        service_type_id:
          type: integer
          example: 1234
        is_group_order:
          type: boolean
          example: true
    AddItemsRequest:
      type: object
      required: [customer_id, items]
      properties:
        customer_id:
          type: integer
          example: 1234
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          example: []
    OrderItem:
      type: object
      properties:
        menu_id:
          type: integer
          example: 1234
        quantity:
          type: integer
          example: 1
        item_id:
          type: integer
          example: 1234
        category_id:
          type: integer
          example: 1234
        comment:
          type: string
          example: string
        style_id:
          type: integer
          nullable: true
          example: 1234
        size_id:
          type: integer
          nullable: true
          example: 1234
        child_items:
          type: array
          items:
            $ref: '#/components/schemas/OrderChildItem'
          example: []
    OrderChildItem:
      type: object
      properties:
        menu_id:
          type: integer
          example: 1234
        quantity:
          type: integer
          example: 1
        pick_list_id:
          type: integer
          example: 1234
        item_id:
          type: integer
          example: 1234
        category_id:
          type: integer
          example: 1234
        style_id:
          type: integer
          nullable: true
          example: 1234
        size_id:
          type: integer
          nullable: true
          example: 1234
    Order:
      type: object
      properties:
        ordersid:
          type: integer
          example: 1234
        restaurant_id:
          type: integer
          example: 1234
        is_cancelable:
          type: boolean
          example: true
        is_editable:
          type: boolean
          example: true
        ordering_status:
          type: string
          example: string
        comments_to_restaurant:
          type: string
          example: string
        internal_notes:
          type: string
          example: string
        tip_percentages:
          type: array
          items:
            type: number
          example: []
        customer:
          $ref: '#/components/schemas/Customer'
        charges:
          $ref: '#/components/schemas/Charges'
    Charges:
      type: object
      properties:
        total_cents:
          type: integer
          example: 100
        subtotal_cents:
          type: integer
          example: 100
        tax_cents:
          type: integer
          example: 100
        delivery_cents:
          type: integer
          example: 100
        tip_cents:
          type: integer
          example: 100
        remaining_cents:
          type: integer
          example: 100
    Store:
      type: object
      properties:
        store_id:
          type: string
          example: '123456'
        rest_id:
          type: integer
          example: 1234
        rest_name:
          type: string
          example: Sample
        address1:
          type: string
          example: 1216 Broadway
        city:
          type: string
          example: New York
        state_code:
          type: string
          example: NY
        zip_code:
          type: string
          example: '10001'
        timezone:
          type: string
          example: string
        latitude:
          type: number
          example: 40.74661
        longitude:
          type: number
          example: -73.98833
        enable_loyalty:
          type: boolean
          example: true
    Menu:
      type: object
      properties:
        menu_id:
          type: integer
          example: 1234
        name:
          type: string
          example: Sample
        service_type_id:
          type: integer
          example: 1234
    MenuItem:
      type: object
      properties:
        item_id:
          type: integer
          example: 1234
        category_id:
          type: integer
          example: 1234
        menu_id:
          type: integer
          example: 1234
        name:
          type: string
          example: Sample
        description:
          type: string
          example: string
        price_cents:
          type: integer
          example: 100
        is_available:
          type: boolean
          example: true
